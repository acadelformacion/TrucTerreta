<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Truc Valenciano</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="game.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     PANTALLA 1: LOBBY
═══════════════════════════════════════════════ -->
<div id="screenLobby" class="screen">
  <div class="lobby-wrap">
    <div class="lobby-header">
      <div class="lobby-suits">
        <span class="ls oros">◉</span>
        <span class="ls copas">♆</span>
        <span class="ls espadas">✦</span>
        <span class="ls bastos">⊕</span>
      </div>
      <h1>Truc <span class="hi">Valenciano</span></h1>
      <p class="lobby-sub">Prototipo 1 vs 1</p>
    </div>

    <div class="lobby-card">
      <div class="lfield">
        <label for="nameInput">Tu nombre</label>
        <input id="nameInput" type="text" placeholder="Ej. Vicent" autocomplete="off" />
      </div>
      <div class="lfield">
        <label for="roomInput">Código de sala</label>
        <input id="roomInput" type="text" placeholder="Ej. K7Q2" autocomplete="off" maxlength="8" />
      </div>
      <div class="lobby-btns">
        <button id="createBtn" class="lbtn lbtn-primary">Crear sala</button>
        <button id="joinBtn"   class="lbtn lbtn-secondary">Unirse</button>
      </div>
      <div id="lobbyMsg" class="lobby-msg"></div>
    </div>

    <div class="lobby-debug">
      <label class="chk-line">
        <input id="debugReveal" type="checkbox" />
        <span>Modo prueba (ver ambas manos)</span>
      </label>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     PANTALLA 2: MESA DE JUEGO
═══════════════════════════════════════════════ -->
<div id="screenGame" class="screen hidden">

  <!-- HUD superior -->
  <div id="hud">
    <div class="hud-left">
      <span id="hudRoom" class="hud-pill">—</span>
      <span id="hudSeat" class="hud-pill">—</span>
    </div>
    <div class="hud-score">
      <span id="hudScore0" class="hud-score-num">0</span>
      <span class="hud-score-sep">·</span>
      <span id="hudScore1" class="hud-score-num">0</span>
    </div>
    <div class="hud-right">
      <span id="hudState" class="hud-pill">—</span>
      <button id="leaveBtn" class="hud-leave">Salir</button>
    </div>
  </div>

  <!-- MESA PRINCIPAL -->
  <div id="table">

    <!-- Zona rival (arriba) -->
    <div id="rivalZone">
      <div id="rivalName" class="player-name rival-name">—</div>
      <div id="rivalCards" class="rival-cards"></div>
    </div>

    <!-- Centro de la mesa: bazas jugadas -->
    <div id="centerZone">
      <div id="trickArea" class="trick-area">
        <div class="trick-slot" id="trickSlot0"></div>
        <div class="trick-divider"></div>
        <div class="trick-slot" id="trickSlot1"></div>
      </div>
      <div id="centerInfo" class="center-info"></div>
    </div>

    <!-- Zona propia (abajo) -->
    <div id="myZone">
      <div id="myCards" class="my-cards"></div>
      <div id="myName" class="player-name my-name">—</div>
    </div>

  </div>

  <!-- PANEL DE ACCIONES (inferior) -->
  <div id="actionPanel">
    <div id="offerMsg" class="offer-msg hidden"></div>
    <div id="actionBtns" class="action-btns">
      <button id="envitBtn" class="abtn abtn-green">Envidar</button>
      <button id="trucBtn"  class="abtn abtn-gold">Trucar</button>
      <button id="mazoBtn"  class="abtn abtn-red">Ir al mazo</button>
    </div>
    <div id="responseArea" class="response-area hidden"></div>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <!-- Info lateral flotante -->
  <div id="sideInfo">
    <div class="si-row"><span class="si-lbl">Mano</span><span id="siMano">—</span></div>
    <div class="si-row"><span class="si-lbl">Ronda</span><span id="siHand">0</span></div>
    <div class="si-row"><span class="si-lbl">Bazas</span><span id="siBazas">0-0</span></div>
  </div>

  <!-- Historial colapsable -->
  <div id="logPanel">
    <div id="logToggle" class="log-toggle">▸ Registro</div>
    <div id="logBody" class="log-body hidden">
      <div id="logArea"></div>
    </div>
  </div>

  <!-- Overlay cuenta atrás -->
  <div id="countdownOverlay" class="hidden">
    <div id="countdownNum">5</div>
    <div class="cd-label">Nueva mano en…</div>
  </div>

  <!-- Overlay fin partida -->
  <div id="gameOverOverlay" class="hidden">
    <div class="go-card">
      <div class="go-title">Partida terminada</div>
      <div id="goWinner" class="go-winner">—</div>
      <div id="goScore"  class="go-score">—</div>
    </div>
  </div>

</div>

</body>
</html>
